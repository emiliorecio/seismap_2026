server:
  port: 8080

spring:
  application:
    name: seismap-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/seismap
    username: seismap
    password: seismap
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.seismap: DEBUG
    org.hibernate.SQL: DEBUG

# OpenAPI / Swagger UI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# GeoServer auto-configuration
seismap:
  geoserver:
    url: http://localhost:8600/geoserver
    admin-user: admin
    admin-password: geoserver
    workspace: seismap
    datastore-name: seismap_postgis
