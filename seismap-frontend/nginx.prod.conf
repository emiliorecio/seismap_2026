##
## nginx config – PRODUCTION mode
## Swagger UI, api-docs and GeoServer Web UI are blocked (404).
## GeoServer WMS/WFS tiles are still proxied (needed by the map).
##

server {
    listen 80;
    server_name _;
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # Log all requests to file in production
    access_log /var/log/nginx/access.log combined;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml
               application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── Dev tools — blocked in production ─────────────────────────────────────
    location = /admin         { return 404; }
    location ^~ /admin/       { return 404; }
    location ^~ /swagger-ui/  { return 404; }
    location ^~ /api-docs/    { return 404; }
    location = /api-docs      { return 404; }

    # ── GeoServer Web UI — blocked in production ───────────────────────────────
    location = /geoserver       { return 404; }
    location ^~ /geoserver/web/ { return 404; }

    # ── GeoServer WMS/WFS (needed for map tiles) ──────────────────────────────
    location ^~ /geoserver/ {
        proxy_pass http://geoserver:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
