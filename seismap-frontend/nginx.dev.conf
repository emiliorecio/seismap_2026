##
## nginx config – DEVELOPMENT mode
## Swagger UI, api-docs and GeoServer Web UI are all proxied and accessible.
##

server {
    listen 80;
    server_name _;
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # No access log in development
    access_log off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml
               application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── Swagger UI ────────────────────────────────────────────────────────────
    # Spring Boot doesn't serve a directory listing for /swagger-ui/,
    # so we redirect bare requests to index.html.
    location = /swagger-ui/ {
        return 301 /swagger-ui/index.html;
    }

    location ^~ /swagger-ui/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
    }

    # ── OpenAPI / api-docs ────────────────────────────────────────────────────
    location = /api-docs {
        proxy_pass http://backend:8080/api-docs;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
    }

    location ^~ /api-docs/ {
        proxy_pass http://backend:8080/api-docs/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
    }

    # ── GeoServer Web UI ──────────────────────────────────────────────────────
    location = /geoserver {
        return 301 /geoserver/web/;
    }

    location ^~ /geoserver/web/ {
        proxy_pass http://geoserver:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── GeoServer WMS/WFS (needed for map tiles) ──────────────────────────────
    location ^~ /geoserver/ {
        proxy_pass http://geoserver:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
