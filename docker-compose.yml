services:
  # PostgreSQL + PostGIS
  postgres:
    image: postgis/postgis:16-3.4
    container_name: seismap-postgres
    environment:
      POSTGRES_DB: seismap
      POSTGRES_USER: seismap
      POSTGRES_PASSWORD: seismap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seismap"]
      interval: 5s
      timeout: 5s
      retries: 5

  # GeoServer (for WMS/WFS layer rendering)
  geoserver:
    image: kartoza/geoserver:2.26.1
    container_name: seismap-geoserver
    environment:
      GEOSERVER_ADMIN_USER: admin
      GEOSERVER_ADMIN_PASSWORD: geoserver
      GEOSERVER_DATA_DIR: /opt/geoserver/data_dir
      # Disable CSRF check so proxied requests from nginx work
      GEOSERVER_CSRF_WHITELIST: "*"
      # Disable GeoServer's OWS service flood protection
      GEOSERVER_OWS_SERVICE_EXCEPTIONS_MAX_COUNT: "0"
      # Allow many concurrent WMS requests
      JAVA_OPTS: >-
        -Xms256m -Xmx1g
        -DGEOSERVER_CSRF_DISABLED=true
        -Dorg.geowebcache.default.max.concurrent.connections=32
    ports:
      - "8600:8080"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - ./controlflow.properties:/opt/geoserver/data_dir/controlflow.properties
    depends_on:
      postgres:
        condition: service_healthy

  # Spring Boot Backend
  backend:
    build:
      context: ./seismap-backend
      dockerfile: Dockerfile
    container_name: seismap-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/seismap
      SPRING_DATASOURCE_USERNAME: seismap
      SPRING_DATASOURCE_PASSWORD: seismap
      SEISMAP_GEOSERVER_URL: http://geoserver:8080/geoserver
      SEISMAP_DATA_FILES_DIRECTORY: /app/data
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    ports:
      - "8080:8080"
      - "5005:5005"
    volumes:
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # React Frontend (served by Nginx)
  frontend:
    build:
      context: ./seismap-frontend
      dockerfile: Dockerfile
    container_name: seismap-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  geoserver_data:
